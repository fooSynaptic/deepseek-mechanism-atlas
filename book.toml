[book]
title = "DeepSeek Mechanism Atlas"
authors = ["fooSynaptic"]
description = "DeepSeek 机制图谱 — MLA / MoE / DSA / DSpark / V4 infra，非官方 mdBook"
language = "zh-Hans"
src = "《ds-技术报告》"

[build]
build-dir = "mdbook-out"
create-missing = false

[output.html]
mathjax-support = false
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/fooSynaptic/deepseek-mechanism-atlas"
site-url = "/deepseek-mechanism-atlas/"
additional-css = ["theme/mdbook.css"]
additional-js = ["theme/katex-render.js"]

[output.html.search]
enable = true
limit-results = 30

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
