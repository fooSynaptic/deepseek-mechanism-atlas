  <text x="460" y="22" class="t" text-anchor="middle">DeepSeek-V3 vs V2: MoE structural innovations</text>
  <text x="460" y="40" class="st" text-anchor="middle">model internals only (routing, expert pool, FFN fusion)</text>
<rect x="24" y="64" width="872" height="198" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/>  <text x="36" y="82" class="ph">1  aux-loss-free routing (V2 softmax + </text>
  <text x="342" y="82" class="m" text-anchor="start"><tspan font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">L</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">aux</tspan><tspan dy="-0.35em" font-size="1em"></tspan></text>
  <text x="372" y="82" class="ph">  vs  V3 sigmoid + bias)</text>
  <text x="228" y="98" class="lb" text-anchor="middle">DeepSeek-V2</text>
  <text x="692" y="98" class="lb" text-anchor="middle">DeepSeek-V3</text>
  <text x="460" y="98" class="st" text-anchor="middle">vs</text>
<rect x="106" y="124" width="68" height="56" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>  <text x="140" y="142" class="lb" text-anchor="middle">Token</text>
  <text x="140" y="158" class="fm" text-anchor="middle"><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">h</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">t</tspan><tspan dy="-0.35em" font-size="1em"></tspan></text>
<rect x="186" y="124" width="84" height="56" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>  <text x="228" y="142" class="lb" text-anchor="middle">Router</text>
  <text x="228" y="158" class="fm" text-anchor="middle"><tspan>softmax</tspan></text>
<rect x="278" y="124" width="84" height="56" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>  <text x="320" y="142" class="lb" text-anchor="middle">Top-6</text>
  <text x="320" y="158" class="fm" text-anchor="middle"><tspan>160 exp.</tspan></text>
<line x1="176" y1="152" x2="186" y2="152" class="arr"/><line x1="270" y1="152" x2="278" y2="152" class="arr"/><rect x="164" y="194" width="128" height="56" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>  <text x="228" y="212" class="lb" text-anchor="middle"><tspan font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">L</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">aux</tspan><tspan dy="-0.35em" font-size="1em"></tspan><tspan> branch</tspan></text>
  <text x="228" y="228" class="fm" text-anchor="middle"><tspan>load balance loss</tspan></text>
<line x1="270" y1="174" x2="228" y2="192" class="arr-d"/>  <text x="228" y="260" class="an" text-anchor="middle">hurts main task loss</text>
<rect x="560" y="124" width="68" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/>  <text x="594" y="142" class="lb" text-anchor="middle">Token</text>
  <text x="594" y="158" class="fm" text-anchor="middle"><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">h</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">t</tspan><tspan dy="-0.35em" font-size="1em"></tspan></text>
<rect x="640" y="120" width="104" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/>  <text x="692" y="138" class="lb" text-anchor="middle">Router</text>
  <text x="692" y="154" class="fm" text-anchor="middle"><tspan>sigmoid </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">s</tspan></text>
  <text x="692" y="168" class="fm" text-anchor="middle"><tspan>+ bias </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">b</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">i</tspan><tspan dy="-0.35em" font-size="1em"></tspan></text>
<rect x="762" y="124" width="84" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/>  <text x="804" y="142" class="lb" text-anchor="middle">Top-8</text>
  <text x="804" y="158" class="fm" text-anchor="middle"><tspan>256 exp.</tspan></text>
<line x1="628" y1="152" x2="638" y2="152" class="arr"/><line x1="744" y1="152" x2="762" y2="152" class="arr"/>  <text x="692" y="212" class="an" text-anchor="middle"><tspan>select: </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">s</tspan><tspan>+</tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">b</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">i</tspan><tspan dy="-0.35em" font-size="1em"></tspan><tspan>  |  gate: </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">s</tspan><tspan> only</tspan></text>
  <text x="692" y="226" class="an" text-anchor="middle"><tspan>no </tspan><tspan font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">L</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">aux</tspan><tspan dy="-0.35em" font-size="1em"></tspan><tspan> in forward graph</tspan></text>
<rect x="24" y="280" width="872" height="172" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="298" class="ph">2  expert scale and sparsity (fine-grained routed pool)</text><rect x="130" y="326" width="196" height="92" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>  <text x="228" y="344" class="lb" text-anchor="middle"><tspan>V2</tspan></text>
  <text x="228" y="360" class="fm" text-anchor="middle"><tspan>160 routed / layer</tspan></text>
  <text x="228" y="374" class="fm" text-anchor="middle"><tspan>Top-6 per token</tspan></text>
  <text x="228" y="388" class="fm" text-anchor="middle"><tspan>2 shared / layer</tspan></text>
  <text x="228" y="402" class="fm" text-anchor="middle"><tspan>236B / 21B act (~8.9%)</tspan></text>
<rect x="594" y="326" width="196" height="92" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/>  <text x="692" y="344" class="lb" text-anchor="middle"><tspan>V3</tspan></text>
  <text x="692" y="360" class="fm" text-anchor="middle"><tspan>256 routed / layer</tspan></text>
  <text x="692" y="374" class="fm" text-anchor="middle"><tspan>Top-8 per token</tspan></text>
  <text x="692" y="388" class="fm" text-anchor="middle"><tspan>1 shared / layer</tspan></text>
  <text x="692" y="402" class="fm" text-anchor="middle"><tspan>671B / 37B act (~5.5%)</tspan></text>
  <text x="460" y="354" class="an" text-anchor="middle">finer pool, lower act %</text>
<rect x="24" y="470" width="872" height="168" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="488" class="ph">3  shared + routed fusion (FFN output structure)</text><rect x="70" y="528" width="96" height="56" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/>  <text x="118" y="546" class="lb" text-anchor="middle"><tspan>Hidden </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">h</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">t</tspan><tspan dy="-0.35em" font-size="1em"></tspan></text>
  <text x="118" y="562" class="fm" text-anchor="middle"><tspan>layer in</tspan></text>
<rect x="238" y="490" width="124" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/>  <text x="300" y="508" class="lb" text-anchor="middle">Router path</text>
  <text x="300" y="524" class="fm" text-anchor="middle"><tspan>sigmoid+bias top-8</tspan></text>
  <text x="300" y="538" class="fm" text-anchor="middle"><tspan>256 routed</tspan></text>
<rect x="238" y="566" width="124" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/>  <text x="300" y="584" class="lb" text-anchor="middle">Shared path</text>
  <text x="300" y="600" class="fm" text-anchor="middle"><tspan>always on</tspan></text>
  <text x="300" y="614" class="fm" text-anchor="middle"><tspan>no top-K</tspan></text>
<rect x="452" y="528" width="116" height="56" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/>  <text x="510" y="546" class="lb" text-anchor="middle">Weighted sum</text>
  <text x="510" y="562" class="fm" text-anchor="middle"><tspan>routed + shared</tspan></text>
<rect x="642" y="528" width="100" height="56" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/>  <text x="692" y="546" class="lb" text-anchor="middle">FFN out</text>
  <text x="692" y="562" class="fm" text-anchor="middle"><tspan>residual</tspan></text>
