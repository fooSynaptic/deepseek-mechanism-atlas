  <marker id="mlaag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="22" class="t">V3.1-Terminus: MLA mode switch by inference phase</text><text x="460" y="40" class="st">same MLA weights and latent cache  |  per-head latent at Prefill, shared at Decode</text><rect x="24" y="56" width="420" height="352" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">Prefill phase  (MHA-style)</text><rect x="476" y="56" width="420" height="352" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="488" y="74" class="ph">Decode phase  (MQA-style)</text><rect x="140" y="124" width="188" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="234" y="142" class="lb">Prompt batch</text><text x="234" y="158" class="dt">L tokens parallel</text><rect x="150" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="168" y="218" class="dt">Q1</text><rect x="194" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="212" y="218" class="dt">Q2</text><rect x="238" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="256" y="218" class="dt">Q3</text><rect x="282" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="300" y="218" class="dt">Q4</text><text x="326" y="240" class="an">x H heads</text><text x="234" y="192" class="an">H query heads</text><line x1="234" y1="180" x2="234" y2="200" class="arr-b"/><text x="234" y="244" class="lb">each Qi maps to own Li</text><rect x="150" y="262" width="36" height="26" rx="4" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="168" y="279" class="dt">L1</text><rect x="194" y="262" width="36" height="26" rx="4" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="212" y="279" class="dt">L2</text><rect x="238" y="262" width="36" height="26" rx="4" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="256" y="279" class="dt">L3</text><rect x="282" y="262" width="36" height="26" rx="4" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="300" y="279" class="dt">L4</text><text x="234" y="300" class="an">H independent latent rows</text><rect x="136" y="308" width="196" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="234" y="326" class="lb">Latent KV write</text><text x="234" y="342" class="dt">MHA-style expansion</text><text x="234" y="356" class="dt">compute-bound prefill</text><line x1="234" y1="300" x2="234" y2="308" class="arr-b"/><text x="234" y="384" class="an">bottleneck: compute</text><rect x="592" y="124" width="188" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="686" y="142" class="lb">Single token</text><text x="686" y="158" class="dt">one decode step</text><rect x="602" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="620" y="218" class="dt">Q1</text><rect x="646" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="664" y="218" class="dt">Q2</text><rect x="690" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="708" y="218" class="dt">Q3</text><rect x="734" y="200" width="36" height="28" rx="4" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="752" y="218" class="dt">Q4</text><text x="778" y="240" class="an">x H heads</text><line x1="686" y1="180" x2="686" y2="200" class="arr-g"/><text x="686" y="244" class="lb">all Qi share one L</text><rect x="620" y="250" width="132" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="686" y="268" class="lb">Shared latent L</text><text x="686" y="284" class="dt">MQA-style 1 row</text><rect x="588" y="322" width="196" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="686" y="340" class="lb">Latent KV read</text><text x="686" y="356" class="dt">full-length cache read</text><text x="686" y="370" class="dt">bandwidth-bound decode</text><line x1="686" y1="306" x2="686" y2="322" class="arr-g"/><text x="686" y="398" class="an">bottleneck: KV bandwidth</text><text x="460" y="266" class="st">engine switches by phase</text><rect x="24" y="426" width="872" height="108" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="444" class="ph">Still MLA (not standard GQA KV)  |  paves DSA on shared decode latent</text><rect x="56" y="456" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="180" y="474" class="lb">Prefill</text><text x="180" y="490" class="dt">per-head latent</text><text x="180" y="504" class="dt">like MHA 8 to 8</text><rect x="336" y="456" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="460" y="474" class="lb">Decode</text><text x="460" y="490" class="dt">shared latent</text><text x="460" y="504" class="dt">like MQA 8 to 1</text><rect x="616" y="456" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="740" y="474" class="lb">Not middle GQA</text><text x="740" y="490" class="dt">no 8-to-2 grouping</text><text x="740" y="504" class="dt">Terminus engine rule</text></svg>