<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .lane-h { font-size: 13px; font-weight: 700; fill: #1e293b; }
      .stage-tag { font-size: 10px; font-weight: 600; fill: #64748b; }
      .box-model { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
      .box-algo { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .box-prompt { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.2; }
      .box-reward { fill: #cffafe; stroke: #0891b2; stroke-width: 1.2; }
      .box-data { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.2; }
      .box-post { fill: #fffbeb; stroke: #d97706; stroke-width: 1.2; stroke-dasharray: 5 3; }
      .label { font-size: 11px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .label-sm { font-size: 10px; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #d97706; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
      .lane-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .legend-box { stroke-width: 1.2; }
    </style>
  </defs>

  <!-- Header -->
  <text x="32" y="36" class="title">DeepSeek-R1 Training Pipeline</text>
  <text x="32" y="58" class="subtitle">arXiv:2501.12948 | Figure 2 structure | Left: R1-Zero | Right: R1 four stages</text>

  <!-- Legend -->
  <g transform="translate(980, 24)">
    <text x="0" y="0" class="label-sm" text-anchor="start" font-weight="700">Legend</text>
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="12" height="12" rx="2" class="legend-box" fill="#ede9fe" stroke="#7c3aed"/>
      <text x="18" y="6" class="label-sm" text-anchor="start">Model</text>
      <rect x="0" y="18" width="12" height="12" rx="2" class="legend-box" fill="#dbeafe" stroke="#2563eb"/>
      <text x="18" y="24" class="label-sm" text-anchor="start">SFT / RL</text>
      <rect x="0" y="36" width="12" height="12" rx="2" class="legend-box" fill="#e0f2fe" stroke="#0284c7"/>
      <text x="18" y="42" class="label-sm" text-anchor="start">Prompt</text>
      <rect x="0" y="54" width="12" height="12" rx="2" class="legend-box" fill="#cffafe" stroke="#0891b2"/>
      <text x="18" y="60" class="label-sm" text-anchor="start">Reward</text>
      <rect x="0" y="72" width="12" height="12" rx="2" class="legend-box" fill="#f1f5f9" stroke="#94a3b8"/>
      <text x="18" y="78" class="label-sm" text-anchor="start">Data</text>
      <rect x="0" y="90" width="12" height="12" rx="2" class="legend-box" fill="#fffbeb" stroke="#d97706" stroke-dasharray="4 3"/>
      <text x="18" y="96" class="label-sm" text-anchor="start">Post-process</text>
    </g>
  </g>

  <!-- Lane backgrounds -->
  <rect x="24" y="88" width="260" height="300" rx="10" class="lane-bg"/>
  <text x="40" y="108" class="lane-h">Path A ? R1-Zero</text>

  <rect x="320" y="88" width="896" height="700" rx="10" class="lane-bg"/>
  <text x="336" y="108" class="lane-h">Path B ? DeepSeek-R1</text>

  <!-- ========== PATH A ========== -->
  <rect x="94" y="140" width="120" height="40" rx="8" class="box-model"/>
  <text x="154" y="160" class="label">DeepSeek-V3 Base</text>

  <line x1="154" y1="180" x2="154" y2="208" class="arrow"/>

  <rect x="109" y="210" width="90" height="34" rx="8" class="box-algo"/>
  <text x="154" y="227" class="label">RL (GRPO)</text>

  <!-- Prompt / Reward below RL, not overlapping spine -->
  <rect x="54" y="262" width="108" height="30" rx="6" class="box-prompt"/>
  <text x="108" y="277" class="label-sm">Reasoning Prompts</text>

  <rect x="178" y="262" width="108" height="30" rx="6" class="box-reward"/>
  <text x="232" y="270" class="label-sm">Accuracy</text>
  <text x="232" y="282" class="label-sm">+ Format</text>

  <line x1="108" y1="244" x2="108" y2="262" class="arrow"/>
  <line x1="232" y1="244" x2="232" y2="262" class="arrow"/>

  <line x1="154" y1="244" x2="154" y2="318" class="arrow"/>

  <rect x="94" y="320" width="120" height="40" rx="8" class="box-model"/>
  <text x="154" y="340" class="label">DeepSeek-R1-Zero</text>

  <!-- Bridge: orthogonal route to Cold Start data (avoids crossing Stage 2) -->
  <line x1="214" y1="340" x2="280" y2="340" class="arrow-dash"/>
  <rect x="282" y="318" width="148" height="44" rx="6" class="box-post"/>
  <text x="356" y="332" class="label-sm">R1-Zero traces</text>
  <text x="356" y="346" class="label-sm">Filter + Refine (V3+Human)</text>
  <polyline points="430,340 328,340 328,160 918,160" class="arrow-dash" fill="none"/>

  <!-- ========== PATH B ? Stage rows ========== -->
  <!-- Column x: model=400, algo=540, prompt=660, reward=800, data=940 -->
  <!-- Row centers: S1=170, S2=310, S3=450, S4=590, Final=710 -->

  <!-- Stage 1 -->
  <text x="336" y="158" class="stage-tag">Stage 1 ? Cold-Start SFT</text>
  <rect x="380" y="140" width="120" height="40" rx="8" class="box-model"/>
  <text x="440" y="160" class="label">DeepSeek-V3 Base</text>
  <line x1="500" y1="160" x2="528" y2="160" class="arrow"/>
  <rect x="530" y="143" width="72" height="34" rx="8" class="box-algo"/>
  <text x="566" y="160" class="label">SFT</text>
  <rect x="920" y="132" width="160" height="56" rx="6" class="box-data"/>
  <text x="1000" y="152" class="label-sm">Cold Start Long CoT</text>
  <text x="1000" y="166" class="label-sm">(thousands of samples)</text>
  <line x1="918" y1="160" x2="602" y2="160" class="arrow"/>
  <polyline points="566,177 566,218 440,218" class="arrow" fill="none"/>
  <rect x="380" y="200" width="120" height="36" rx="8" class="box-model"/>
  <text x="440" y="218" class="label">R1 Dev-1</text>

  <!-- Stage 2 -->
  <text x="336" y="278" class="stage-tag">Stage 2 - RL-1</text>
  <polyline points="440,236 440,285 500,285" class="arrow" fill="none"/>
  <rect x="530" y="268" width="72" height="34" rx="8" class="box-algo"/>
  <text x="566" y="285" class="label">RL (GRPO)</text>
  <rect x="660" y="270" width="118" height="30" rx="6" class="box-prompt"/>
  <text x="719" y="285" class="label-sm">Reasoning Prompts</text>
  <rect x="800" y="264" width="148" height="42" rx="6" class="box-reward"/>
  <text x="874" y="278" class="label-sm">Rule Reward +</text>
  <text x="874" y="292" class="label-sm">Lang. Consistency</text>
  <line x1="500" y1="285" x2="528" y2="285" class="arrow"/>
  <line x1="602" y1="285" x2="660" y2="285" class="arrow"/>
  <line x1="778" y1="285" x2="800" y2="285" class="arrow"/>
  <polyline points="566,302 566,346 440,346" class="arrow" fill="none"/>
  <rect x="380" y="328" width="120" height="36" rx="8" class="box-model"/>
  <text x="440" y="346" class="label">R1 Dev-2</text>

  <!-- Stage 3 -->
  <text x="336" y="418" class="stage-tag">Stage 3 - Reject-Sample SFT</text>
  <polyline points="440,364 440,425 500,425" class="arrow" fill="none"/>
  <rect x="530" y="408" width="72" height="34" rx="8" class="box-algo"/>
  <text x="566" y="425" class="label">SFT</text>
  <rect x="660" y="392" width="420" height="66" rx="6" class="box-data"/>
  <text x="870" y="412" class="label-sm">Rejection Sampling: Reasoning ~600K + Non-Reasoning ~200K</text>
  <text x="870" y="428" class="label-sm">Sampled from Dev-2 / R1-Zero / V3, then filtered</text>
  <line x1="500" y1="425" x2="528" y2="425" class="arrow"/>
  <line x1="602" y1="425" x2="660" y2="425" class="arrow"/>
  <polyline points="566,442 566,486 440,486" class="arrow" fill="none"/>
  <rect x="380" y="468" width="120" height="36" rx="8" class="box-model"/>
  <text x="440" y="486" class="label">R1 Dev-3</text>

  <!-- Stage 4 -->
  <text x="336" y="558" class="stage-tag">Stage 4 - RL-2</text>
  <polyline points="440,504 440,565 500,565" class="arrow" fill="none"/>
  <rect x="530" y="548" width="72" height="34" rx="8" class="box-algo"/>
  <text x="566" y="565" class="label">RL (GRPO)</text>
  <rect x="660" y="550" width="118" height="30" rx="6" class="box-prompt"/>
  <text x="719" y="565" class="label-sm">Diverse Prompts</text>
  <rect x="800" y="544" width="148" height="42" rx="6" class="box-reward"/>
  <text x="874" y="558" class="label-sm">Rule + Preference</text>
  <text x="874" y="572" class="label-sm">Reward (RM)</text>
  <line x1="500" y1="565" x2="528" y2="565" class="arrow"/>
  <line x1="602" y1="565" x2="660" y2="565" class="arrow"/>
  <line x1="778" y1="565" x2="800" y2="565" class="arrow"/>
  <polyline points="566,582 566,628 440,628" class="arrow" fill="none"/>
  <rect x="380" y="608" width="120" height="40" rx="8" class="box-model"/>
  <text x="440" y="628" class="label">DeepSeek-R1</text>

  <!-- Vertical guide for main spine (subtle) -->
  <line x1="440" y1="200" x2="440" y2="608" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Footer note -->
  <text x="32" y="800" class="subtitle">Dev-1/2/3 = intermediate checkpoints (paper Table 3). R1-Zero branch is independent pure-RL exploration.</text>
</svg>
