<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="a4g" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .t{font-size:16px;font-weight:700;fill:#0f172a}
      .s{font-size:11px;fill:#64748b}
      .h{font-size:12px;font-weight:600;fill:#334155}
      .l{font-size:10px;fill:#334155;text-anchor:middle}
      .frozen{fill:#f1f5f9;stroke:#94a3b8;stroke-width:1.5;rx:8}
      .active{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.5;rx:8}
      .tbl{fill:#fef3c7;stroke:#d97706;stroke-width:1.5;rx:6}
      .arr{stroke:#475569;stroke-width:1.4;fill:none;marker-end:url(#a4)}
      .inj{stroke:#7c3aed;stroke-width:2;fill:none;marker-end:url(#a4g)}
      .hl{fill:#fde68a;opacity:0.6}
    </style>
  </defs>

  <text x="24" y="32" class="t">(4) Tiny-Engram - Trigger-Indexed Concept Injection for Vision</text>
  <text x="24" y="52" class="s">arXiv:2605.20309 | AutoArk | Activate memory only on trigger; freeze SD/DiT backbone</text>

  <text x="40" y="88" class="h">Prompt (compositional editing preserved)</text>
  <rect x="40" y="100" width="840" height="44" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="128" class="l" text-anchor="start" font-size="11">"A photo of</text>
  <rect x="148" y="112" width="100" height="22" class="hl"/>
  <text x="198" y="128" class="l" font-weight="600" fill="#92400e">&lt;sks&gt; person</text>
  <text x="260" y="128" class="l" text-anchor="start" font-size="11">walking in the rain, cinematic"</text>
  <text x="460" y="128" class="l" fill="#64748b" font-size="9">registered trigger n-gram activates lookup</text>

  <text x="40" y="168" class="h">Conditional path (inject on Text Encoder side only)</text>
  <rect x="40" y="180" width="200" height="50" class="frozen"/>
  <text x="140" y="202" class="l">Text Encoder</text>
  <text x="140" y="218" class="l" font-size="9">weights frozen</text>

  <rect x="280" y="180" width="160" height="50" class="tbl"/>
  <text x="360" y="200" class="l">Concept Table</text>
  <text x="360" y="216" class="l" font-size="9">trigger to memory residual</text>

  <line x1="240" y1="205" x2="278" y2="205" class="arr"/>
  <text x="255" y="196" class="l" font-size="8">n-gram match</text>

  <rect x="480" y="180" width="200" height="50" class="active"/>
  <text x="580" y="200" class="l">Hidden + delta_mem</text>
  <text x="580" y="216" class="l" font-size="9">only at trigger token positions</text>

  <line x1="440" y1="205" x2="478" y2="205" class="inj"/>

  <rect x="720" y="180" width="160" height="50" class="frozen"/>
  <text x="800" y="202" class="l">Non-trigger region</text>
  <text x="800" y="218" class="l" font-size="9">unchanged base hidden</text>
  <line x1="680" y1="205" x2="718" y2="205" class="arr" stroke-dasharray="4 3"/>

  <text x="40" y="260" class="h">Generation backbone (fully frozen)</text>
  <rect x="40" y="272" width="400" height="70" class="frozen"/>
  <text x="240" y="300" class="l">UNet / DiT + VAE</text>
  <text x="240" y="318" class="l" font-size="9">LoRA updates full path weights; Tiny-Engram does not</text>
  <text x="240" y="332" class="l" font-size="9">resists catastrophic forgetting, very few params</text>

  <rect x="480" y="272" width="400" height="70" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="680" y="300" class="l">Output image</text>
  <text x="680" y="318" class="l" font-size="9">identity bound to trigger; rest of prompt still composable</text>
  <line x1="440" y1="307" x2="478" y2="307" class="arr"/>

  <text x="40" y="370" class="h">vs LoRA: explicit activation boundary</text>
  <rect x="40" y="382" width="400" height="110" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="240" y="408" class="l" fill="#b91c1c">LoRA / Adapter</text>
  <text x="240" y="428" class="l" font-size="9">continuous weight updates on full path</text>
  <text x="240" y="444" class="l" font-size="9">hard to control when concept is retrieved</text>
  <text x="240" y="478" class="l" font-size="9">more params, higher forgetting risk</text>

  <rect x="480" y="382" width="400" height="110" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="680" y="408" class="l" fill="#16a34a">Tiny-Engram</text>
  <text x="680" y="428" class="l" font-size="9">O(1) trigger lookup, lexical address</text>
  <text x="680" y="444" class="l" font-size="9">no trigger = identical to base model</text>
  <text x="680" y="478" class="l" font-size="9">strong on images; video identity persistence still weak</text>
</svg>
