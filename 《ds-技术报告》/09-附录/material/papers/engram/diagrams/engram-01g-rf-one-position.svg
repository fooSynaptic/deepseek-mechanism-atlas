<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 424" width="860" height="424" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="og_a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .t{font-size:14px;font-weight:700;fill:#0f172a;text-anchor:middle}
      .h{font-size:11px;font-weight:600;fill:#334155;text-anchor:middle}
      .b{font-size:9px;fill:#334155;text-anchor:middle}
      .s{font-size:8px;fill:#64748b;text-anchor:middle}
      .l{font-size:8px;fill:#334155;text-anchor:start}
      .box{rx:5;stroke-width:1.2}
      .arr{stroke:#475569;stroke-width:1.1;fill:none;marker-end:url(#og_a)}
      .tap{stroke:#2563eb;stroke-width:1.2;fill:none;stroke-dasharray:4 2}
      .hi{fill:#fff7ed;stroke:#ea580c;stroke-width:1.3}
      .on{fill:#dbeafe;stroke:#2563eb;stroke-width:1.3}
      .off{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:1}
      .note{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1}
    </style>
  </defs>

  <text x="430" y="22" class="t">At position t: how RF goes from 1 to 10</text>
  <text x="430" y="40" class="s">Only Conv1D mixes across positions; RMSNorm / SiLU / residual do not widen sequence span</text>

  <!-- Step 6 state -->
  <text x="430" y="62" class="h">After Step 6 (RF = 1): output at t sees only v~_t</text>
  <rect x="80" y="72" width="700" height="44" class="note" rx="6"/>
  <rect x="100" y="82" width="52" height="28" class="box off"/>
  <text x="126" y="100" class="b">t-9</text>
  <rect x="168" y="82" width="52" height="28" class="box off"/>
  <text x="194" y="100" class="b">t-6</text>
  <rect x="236" y="82" width="52" height="28" class="box off"/>
  <text x="262" y="100" class="b">t-3</text>
  <rect x="304" y="82" width="52" height="28" class="box hi"/>
  <text x="330" y="100" class="b">t</text>
  <text x="430" y="100" class="s">Y_t = v~_t only (others ignored)</text>

  <!-- Step 7 conv -->
  <text x="430" y="138" class="h">Step 7 Conv1D (w=4, d=3): read 4 taps, weighted sum</text>
  <rect x="80" y="148" width="700" height="56" class="note" rx="6"/>
  <rect x="100" y="160" width="52" height="32" class="box on"/>
  <text x="126" y="174" class="b">v~_t-9</text>
  <text x="126" y="186" class="s">w0</text>
  <rect x="168" y="160" width="52" height="32" class="box on"/>
  <text x="194" y="174" class="b">v~_t-6</text>
  <text x="194" y="186" class="s">w1</text>
  <rect x="236" y="160" width="52" height="32" class="box on"/>
  <text x="262" y="174" class="b">v~_t-3</text>
  <text x="262" y="186" class="s">w2</text>
  <rect x="304" y="160" width="52" height="32" class="box hi"/>
  <text x="330" y="174" class="b">v~_t</text>
  <text x="330" y="186" class="s">w3</text>
  <line x1="126" y1="168" x2="330" y2="168" class="tap"/>
  <line x1="194" y1="168" x2="330" y2="168" class="tap"/>
  <line x1="262" y1="168" x2="330" y2="168" class="tap"/>
  <text x="430" y="212" class="s">conv_out_t = w0&#42;v~_t-9 + w1&#42;v~_t-6 + w2&#42;v~_t-3 + w3&#42;v~_t</text>
  <text x="430" y="226" class="s">gap d=3 between taps (not consecutive positions)</text>

  <!-- span bar -->
  <text x="430" y="252" class="h">Why span = 10, not 4</text>
  <rect x="100" y="262" width="468" height="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="1" rx="3"/>
  <line x1="100" y1="252" x2="100" y2="282" stroke="#7c3aed" stroke-width="1"/>
  <line x1="568" y1="252" x2="568" y2="282" stroke="#7c3aed" stroke-width="1"/>
  <text x="100" y="296" class="s">t-9</text>
  <text x="568" y="296" class="s">t</text>
  <text x="334" y="296" class="b">index range covers 10 tokens: t-9 ... t</text>
  <text x="334" y="310" class="s">RF_seq = 1 + (w-1)&#42;d = 1 + 3&#42;3 = 10</text>

  <!-- pipeline legend -->
  <rect x="24" y="324" width="812" height="88" class="note" rx="6"/>
  <text x="40" y="342" class="l" font-weight="600">What each Step 7 block does (formula left to right)</text>
  <text x="40" y="358" class="l">1. RMSNorm: scale each v~_t vector; still one position -&gt; one vector (RF stays 1)</text>
  <text x="40" y="374" class="l">2. Conv1D: THE step that mixes v~_t-9, v~_t-6, v~_t-3, v~_t -&gt; RF becomes 10</text>
  <text x="40" y="390" class="l">3. SiLU: nonlinear on conv output; does not add new positions</text>
  <text x="440" y="358" class="l">4. + v~ (residual): add original v~_t back so Y_t never loses current token memory</text>
  <text x="440" y="374" class="l">5. Step 8: H^(l) &lt;- H^(l) + Y; then Attention for global context</text>
  <text x="440" y="390" class="l" fill="#b45309">Common mistake: w=4 means 4 taps, not RF=4</text>
</svg>
