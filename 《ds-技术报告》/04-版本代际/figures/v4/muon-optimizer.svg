<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#muoa); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#muoad); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#muoab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#muoag); }
]]></style>
<defs>
  <marker id="muoa" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="muoad" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="muoab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="muoag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>

<style><![CDATA[
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#muoab); }
]]></style>
<text x="460" y="22" class="t">DeepSeek-V4 Muon optimizer</text><text x="460" y="40" class="st">matrix orthogonal update (most params) vs AdamW (embed / head / RMSNorm / mHC gates)</text><rect x="24" y="58" width="872" height="128" rx="8" fill="#eef1f8" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="76" class="ph">Parameter split (Basic Configurations, paper sec 2.4)</text><rect x="50" y="82" width="360" height="84" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="230" y="100" class="lb">AdamW</text><text x="230" y="116" class="dt">embed</text><text x="230" y="130" class="dt">pred head</text><text x="230" y="144" class="dt">RMSNorm</text><text x="230" y="158" class="dt">mHC gates</text><rect x="510" y="82" width="360" height="84" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="690" y="100" class="lb">Muon</text><text x="690" y="116" class="dt">attention / FFN / MoE matrices</text><text x="690" y="130" class="dt">all other W in R(n x m)</text><text x="460" y="174" class="an">reuse AdamW LR schedule via RMS rescale gamma = 0.18</text><rect x="24" y="200" width="872" height="168" rx="8" fill="#eef1f8" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="218" class="ph">Algorithm 1 — one Muon step per weight matrix W</text><rect x="35" y="249" width="100" height="58" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="85" y="267" class="lb">G_t</text><text x="85" y="283" class="dt">grad L</text><rect x="160" y="249" width="100" height="58" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="210" y="267" class="lb">M_t</text><text x="210" y="283" class="dt">mu M + G</text><line x1="135" y1="278" x2="160" y2="278" class="arr-b"/><rect x="285" y="249" width="100" height="58" rx="6" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1.5"/><text x="335" y="267" class="lb">Nesterov</text><text x="335" y="283" class="dt">mu M + G</text><line x1="260" y1="278" x2="285" y2="278" class="arr-b"/><rect x="410" y="249" width="100" height="58" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="460" y="267" class="lb">Hybrid NS</text><text x="460" y="283" class="dt">10 iter</text><text x="460" y="297" class="dt">8 fast + 2 stable</text><line x1="385" y1="278" x2="410" y2="278" class="arr-b"/><rect x="535" y="249" width="100" height="58" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="585" y="267" class="lb">RMS rescale</text><text x="585" y="283" class="dt">sqrt max(n,m)</text><text x="585" y="297" class="dt">x gamma</text><line x1="510" y1="278" x2="535" y2="278" class="arr-b"/><rect x="660" y="249" width="100" height="58" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="710" y="267" class="lb">W_t</text><text x="710" y="283" class="dt">decay + update</text><line x1="635" y1="278" x2="660" y2="278" class="arr-b"/><text x="460" y="350" class="an">NS target: M = U Sigma V^T  -&gt;  UV^T  (polar factor; singular values -&gt; 1)</text><rect x="24" y="382" width="872" height="108" rx="8" fill="#eef1f8" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="400" class="ph">Hybrid Newton-Schulz (V4 tweak vs Kimi Muon)</text><rect x="60" y="415" width="380" height="58" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="250" y="433" class="lb">Stage 1 - steps 1-8</text><text x="250" y="449" class="dt">(a,b,c) = (3.4445, -4.7750, 2.0315)</text><text x="250" y="463" class="dt">rapid sigma -&gt; 1</text><line x1="440" y1="444" x2="480" y2="444" class="arr"/><rect x="480" y="415" width="380" height="58" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="670" y="433" class="lb">Stage 2 - steps 9-10</text><text x="670" y="449" class="dt">(a,b,c) = (2, -1.5, 0.5)</text><text x="670" y="463" class="dt">stabilize sigma = 1</text></svg>