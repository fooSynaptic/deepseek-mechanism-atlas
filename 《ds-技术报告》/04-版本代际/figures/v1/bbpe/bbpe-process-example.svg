<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#bbpea); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#bbpead); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#bbpeab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#bbpeag); }
]]></style>
<defs>
  <marker id="bbpea" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="bbpead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="bbpeab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="bbpeag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="24" class="t">BBPE 训练过程示例 (示意)</text><text x="460" y="42" class="st">DeepSeek V1: UTF-8 byte-level BPE + 100k merges</text><rect x="40" y="58" width="840" height="88" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="52" y="76" class="ph">Step 1  Pre-tokenization + UTF-8</text><rect x="110" y="80" width="160" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="190" y="98" class="lb">Input text</text><text x="190" y="114" class="dt">Hi + zh sample</text><rect x="370" y="69" width="320" height="78" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="530" y="87" class="lb">UTF-8 byte sequence</text><text x="530" y="103" class="dt">48 69  (Hi)</text><text x="530" y="117" class="dt">E4 B8 96  (char A)</text><text x="530" y="131" class="dt">E7 95 8C  (char B)</text><line x1="280" y1="108" x2="360" y2="108" class="arr-b"/><rect x="40" y="162" width="840" height="72" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="52" y="180" class="ph">Step 2  Base symbols (256 bytes)</text><rect x="200" y="168" width="520" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="460" y="186" class="lb">Initial tokens = single bytes</text><text x="460" y="202" class="dt">Vocab seed: 0x00 .. 0xFF (256 entries)</text><text x="460" y="216" class="dt">Any UTF-8 string decomposes to bytes -&gt; no UNK at base layer</text><rect x="40" y="250" width="840" height="168" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="52" y="268" class="ph">Step 3  Iterative merge (frequency-driven)</text><rect x="60" y="279" width="240" height="78" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="180" y="297" class="lb">Merge 1</text><text x="180" y="313" class="dt">Pair (E4, B8) most frequent</text><text x="180" y="327" class="dt">New token T1 = E4+B8</text><text x="180" y="341" class="dt">Seq: 48 69 | T1 96 | ...</text><rect x="340" y="279" width="240" height="78" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="460" y="297" class="lb">Merge 2</text><text x="460" y="313" class="dt">Pair (T1, 96) -&gt; T2</text><text x="460" y="327" class="dt">T2 encodes one zh char</text><text x="460" y="341" class="dt">Seq: 48 69 | T2 | ...</text><rect x="620" y="279" width="240" height="78" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="740" y="297" class="lb">Merge 3</text><text x="740" y="313" class="dt">Pair (48, 69) -&gt; T3</text><text x="740" y="327" class="dt">T3 = Hi subword</text><text x="740" y="341" class="dt">Repeat until 100k merges</text><line x1="300" y1="318" x2="340" y2="318" class="arr"/><line x1="580" y1="318" x2="620" y2="318" class="arr"/><text x="460" y="392" class="an">Each step: count adjacent pair freq, merge max, append to merge table</text><rect x="40" y="432" width="840" height="108" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="52" y="450" class="ph">Step 4  Encode (inference) + final vocab</text><rect x="150" y="449" width="220" height="78" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="260" y="467" class="lb">Greedy longest match</text><text x="260" y="483" class="dt">Apply merge table</text><text x="260" y="497" class="dt">Hi -&gt; T3, zh -&gt; T2/T4</text><text x="260" y="511" class="dt">Output token id sequence</text><rect x="520" y="449" width="280" height="78" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="660" y="467" class="lb">V1 BBPE vocabulary</text><text x="660" y="483" class="dt">256 bytes + 100,000 merges</text><text x="660" y="497" class="dt">+ 15 special -&gt; 100,015 ids</text><text x="660" y="511" class="dt">embedding rows: 102,400 (reserved)</text><line x1="370" y1="488" x2="520" y2="488" class="arr-g"/></svg>