<text x="460" y="22" class="t">Index Share: FFFS 跨层 index 复用</text><text x="460" y="40" class="st">每 4 层 3 次 indexer + 1 次复用 -&gt; 减 75% indexer 计算</text><rect x="76" y="92" width="88" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="120" y="108" class="lb">L1</text><text x="120" y="124" class="lb">F</text><text x="120" y="140" class="dt">算 indexer</text><rect x="216" y="92" width="88" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="260" y="108" class="lb">L2</text><text x="260" y="124" class="lb">F</text><text x="260" y="140" class="dt">算 indexer</text><rect x="356" y="92" width="88" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="400" y="108" class="lb">L3</text><text x="400" y="124" class="lb">F</text><text x="400" y="140" class="dt">算 indexer</text><rect x="496" y="92" width="88" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="540" y="108" class="lb">L4</text><text x="540" y="124" class="lb">S</text><text x="540" y="140" class="dt">复用 L3</text><rect x="636" y="92" width="88" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="680" y="108" class="lb">L5</text><text x="680" y="124" class="lb">F</text><text x="680" y="140" class="dt">算 indexer</text><rect x="776" y="92" width="88" height="56" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="820" y="108" class="lb">L6</text><text x="820" y="124" class="lb">F</text><text x="820" y="140" class="dt">...</text><line x1="164" y1="120" x2="216" y2="120" class="arr"/><line x1="304" y1="120" x2="356" y2="120" class="arr"/><line x1="444" y1="120" x2="496" y2="120" class="arr"/><line x1="584" y1="120" x2="636" y2="120" class="arr"/><line x1="724" y1="120" x2="776" y2="120" class="arr"/><line x1="400" y1="92" x2="540" y2="72" class="arr-g"/><line x1="540" y1="72" x2="540" y2="92" class="arr-g"/><text x="470" y="68" class="an">cached indices</text><text x="460" y="210" class="st">模式 F F F S 周期重复  |  零额外显存</text><text x="460" y="248" class="an">仅适用于 DSA 系 (V3.2 / GLM-5)  |  与 ESS offload 正交</text></svg>