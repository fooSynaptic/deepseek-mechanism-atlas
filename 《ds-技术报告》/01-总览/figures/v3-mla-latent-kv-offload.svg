<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#v3off2a); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#v3off2ab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#v3off2ag); }
  .arr-o { stroke: #E67E22; stroke-width: 1.5; fill: none; marker-end: url(#v3off2ao); }
]]></style>
<defs>
  <marker id="v3off2a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="v3off2ab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="v3off2ag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
  <marker id="v3off2ao" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#E67E22"/></marker>
</defs>
<text x="460" y="22" class="t" text-anchor="middle">V3 / V3.1：同质 MLA Latent-Cache 与 KV offload</text><text x="460" y="40" class="st" text-anchor="middle">单一流 c^KV + k^R 序列 · 随 L 线性占 HBM · 可选整条搬 CPU</text><rect x="30" y="74" width="200" height="72" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="130" y="102" class="lb" text-anchor="middle">Decode 第 t 步</text><text x="130" y="120" class="dt" text-anchor="middle">MLA 层写出新 entry</text><text x="130" y="134" class="dt" text-anchor="middle">c^KV[t] + k^R[t]</text><line x1="230" y1="110" x2="290" y2="110" class="arr-b"/><rect x="290" y="68" width="380" height="104" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="480" y="84" class="lb" text-anchor="middle">GPU HBM · Latent-Cache（单层示意）</text><text x="480" y="100" class="dt" text-anchor="middle">同质 latent 向量流 · 每步 append 一条</text><rect x="340" y="112" width="48" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="364" y="128" class="dt" text-anchor="middle">t1</text><rect x="400" y="112" width="48" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="424" y="128" class="dt" text-anchor="middle">t2</text><rect x="460" y="112" width="48" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="484" y="128" class="dt" text-anchor="middle">t3</text><rect x="520" y="112" width="48" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="544" y="128" class="dt" text-anchor="middle">t4</text><rect x="580" y="112" width="48" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="604" y="128" class="dt" text-anchor="middle">t5</text><rect x="640" y="112" width="48" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/><text x="664" y="128" class="dt" text-anchor="middle">tL</text><text x="700" y="128" class="dt" text-anchor="middle">…</text><text x="480" y="158" class="an" text-anchor="middle">容量 O(L) 线性增长 -&gt; 占满 HBM</text><rect x="720" y="68" width="170" height="104" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 4"/><text x="805" y="84" class="lb" text-anchor="middle">CPU DRAM</text><text x="805" y="102" class="dt" text-anchor="middle">通用 KV offload</text><text x="805" y="116" class="dt" text-anchor="middle">FlexGen / vLLM</text><text x="805" y="130" class="dt" text-anchor="middle">CPU offload 等</text><line x1="670" y1="120" x2="720" y2="120" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#v3offag)"/><line x1="720" y1="140" x2="670" y2="140" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#v3offag)"/><text x="695" y="108" class="an" text-anchor="middle">H2D</text><text x="695" y="152" class="an" text-anchor="middle">D2H</text><rect x="80" y="210" width="760" height="68" rx="6" fill="#f8f9fc" stroke="#94a3b8" stroke-width="1.5"/><text x="460" y="232" class="dt" text-anchor="middle">与 V3.2 ESS 不同：无 Indexer/Latent 拆分 · 无稀疏 entry prefetch</text><text x="460" y="252" class="dt" text-anchor="middle">MLA 自定义 layout -&gt; 很多引擎不支持标准 offload</text><text x="460" y="270" class="dt" text-anchor="middle">瓶颈：latent 线性涨满 HBM -&gt; decode batch size 受限</text></svg>