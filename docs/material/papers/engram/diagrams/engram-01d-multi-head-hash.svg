<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 336" width="720" height="336" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">
  <defs>
    <marker id="mh_a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>

      .t{font-size:13px;font-weight:700;fill:#0f172a;text-anchor:middle;font-family:system-ui, -apple-system, sans-serif}
      .s{font-size:9px;fill:#64748b;text-anchor:middle;font-family:system-ui, -apple-system, sans-serif}
      .b{font-size:10px;fill:#334155;text-anchor:middle}
      .m{font-size:11px;fill:#334155;text-anchor:middle}
      .fm{font-size:9px;fill:#475569;text-anchor:middle}
      .box{rx:5;stroke-width:1.2}

      .arr{stroke:#475569;stroke-width:1.2;fill:none;marker-end:url(#mh_a)}
      .tbl{fill:#faf5ff;stroke:#a78bfa;stroke-width:1}
      .cell{fill:#ede9fe;stroke:#c4b5fd;stroke-width:0.6}
      .hit{fill:#7c3aed;stroke:#5b21b6;stroke-width:0.8}
      .note{fill:#f0fdf4;stroke:#86efac;stroke-width:1.2;rx:6}
      .zone-cpu{fill:#eff6ff;stroke:#93c5fd;stroke-width:1;opacity:0.55}
      .zone-gpu{fill:#fff7ed;stroke:#fb923c;stroke-width:1;opacity:0.55}
      .divln{stroke:#64748b;stroke-width:1.4;stroke-dasharray:6 4}
      .zh{font-size:9px;font-weight:700;fill:#1e40af;font-family:system-ui, -apple-system, sans-serif}
      .zg{font-size:9px;font-weight:700;fill:#c2410c;font-family:system-ui, -apple-system, sans-serif}
      .pref{stroke:#ea580c;stroke-width:1.2;fill:none;stroke-dasharray:4 3;marker-end:url(#mh_a)}
    </style>
  </defs>

  <!-- CPU / GPU zones -->
  <rect x="12" y="48" width="696" height="176" rx="8" class="zone-cpu"/>
  <rect x="12" y="234" width="696" height="86" rx="8" class="zone-gpu"/>
  <line x1="12" y1="228" x2="708" y2="228" class="divln"/>
  <text x="24" y="222" class="zh" text-anchor="start">CPU / Host DRAM / CXL</text>
  <text x="24" y="244" class="zg" text-anchor="start">GPU HBM (prefetch staging)</text>

  <text x="360" y="20" class="t">Step 3: Multi-head Hash Addressing</text>
  <text x="360" y="38" class="m" text-anchor="middle"><tspan font-style="italic">z</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,k</tspan><tspan> = </tspan><tspan font-style="italic">&#x3C6;</tspan><tspan baseline-shift="sub" font-size="0.72em">n,k</tspan><tspan>(</tspan><tspan font-style="italic">g</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n</tspan><tspan>),  </tspan><tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,k</tspan><tspan> = </tspan><tspan font-style="italic">E</tspan><tspan baseline-shift="sub" font-size="0.72em">n,k</tspan><tspan>[</tspan><tspan font-style="italic">z</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,k</tspan><tspan>]  |  deterministic multiply-XOR hash</tspan></text>

  <rect x="16" y="72" width="96" height="44" class="box" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="64" y="92" class="m"><tspan font-style="italic">g</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n</tspan></text>
  <text x="64" y="106" class="s">n-gram at t</text>
  <text x="64" y="118" class="s">e.g. 3-gram</text>
  <line x1="112" y1="94" x2="132" y2="94" class="arr"/>
  <line x1="132" y1="94" x2="132" y2="58" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
  <line x1="132" y1="94" x2="132" y2="130" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
  <line x1="132" y1="94" x2="132" y2="202" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
  <line x1="132" y1="58" x2="148" y2="58" class="arr"/>
  <line x1="132" y1="130" x2="148" y2="130" class="arr"/>
  <line x1="132" y1="202" x2="148" y2="202" class="arr"/>
  <text x="124" y="88" class="fm" font-style="italic">K</text>
  <text x="134" y="88" class="fm"> heads</text>
  <rect x="148" y="42" width="72" height="32" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="184" y="58" class="m" text-anchor="middle"><tspan font-style="italic">&#x3C6;</tspan><tspan baseline-shift="sub" font-size="0.72em">n,1</tspan></text>
  <text x="184" y="70" class="s">hash head 1</text>
  <line x1="220" y1="58" x2="236" y2="58" class="arr"/>
  <rect x="236" y="46" width="52" height="24" class="box" fill="#fff7ed" stroke="#fb923c"/>
  <text x="262" y="62" class="m" text-anchor="middle"><tspan font-style="italic">z</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,1</tspan></text>
  <line x1="288" y1="58" x2="304" y2="58" class="arr"/>
  <rect x="304" y="40" width="108" height="36" class="tbl"/>
  <rect x="310" y="46" width="14" height="10" class="cell"/>
  <rect x="310" y="56" width="14" height="10" class="cell"/>
  <rect x="324" y="46" width="14" height="10" class="cell"/>
  <rect x="324" y="56" width="14" height="10" class="cell"/>
  <rect x="338" y="46" width="14" height="10" class="cell"/>
  <rect x="338" y="56" width="14" height="10" class="cell"/>
  <rect x="352" y="46" width="14" height="10" class="cell"/>
  <rect x="352" y="56" width="14" height="10" class="cell"/>
  <rect x="366" y="46" width="14" height="10" class="cell"/>
  <rect x="366" y="56" width="14" height="10" class="cell"/>
  <rect x="380" y="46" width="14" height="10" class="cell"/>
  <rect x="380" y="56" width="14" height="10" class="cell"/>
  <rect x="334" y="56" width="14" height="10" class="hit"/>
  <text x="358" y="44" class="fm" text-anchor="middle"><tspan font-style="italic">E</tspan><tspan baseline-shift="sub" font-size="0.68em">n,1</tspan></text>
  <line x1="412" y1="58" x2="428" y2="58" class="arr"/>
  <rect x="428" y="46" width="56" height="24" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="456" y="62" class="m" text-anchor="middle"><tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,1</tspan></text>
  <line x1="484" y1="58" x2="512" y2="58" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="148" y="114" width="72" height="32" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="184" y="130" class="m" text-anchor="middle"><tspan font-style="italic">&#x3C6;</tspan><tspan baseline-shift="sub" font-size="0.72em">n,2</tspan></text>
  <text x="184" y="142" class="s">hash head 2</text>
  <line x1="220" y1="130" x2="236" y2="130" class="arr"/>
  <rect x="236" y="118" width="52" height="24" class="box" fill="#fff7ed" stroke="#fb923c"/>
  <text x="262" y="134" class="m" text-anchor="middle"><tspan font-style="italic">z</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,2</tspan></text>
  <line x1="288" y1="130" x2="304" y2="130" class="arr"/>
  <rect x="304" y="112" width="108" height="36" class="tbl"/>
  <rect x="310" y="118" width="14" height="10" class="cell"/>
  <rect x="310" y="128" width="14" height="10" class="cell"/>
  <rect x="324" y="118" width="14" height="10" class="cell"/>
  <rect x="324" y="128" width="14" height="10" class="cell"/>
  <rect x="338" y="118" width="14" height="10" class="cell"/>
  <rect x="338" y="128" width="14" height="10" class="cell"/>
  <rect x="352" y="118" width="14" height="10" class="cell"/>
  <rect x="352" y="128" width="14" height="10" class="cell"/>
  <rect x="366" y="118" width="14" height="10" class="cell"/>
  <rect x="366" y="128" width="14" height="10" class="cell"/>
  <rect x="380" y="118" width="14" height="10" class="cell"/>
  <rect x="380" y="128" width="14" height="10" class="cell"/>
  <rect x="366" y="128" width="14" height="10" class="hit"/>
  <text x="358" y="116" class="fm" text-anchor="middle"><tspan font-style="italic">E</tspan><tspan baseline-shift="sub" font-size="0.68em">n,2</tspan></text>
  <line x1="412" y1="130" x2="428" y2="130" class="arr"/>
  <rect x="428" y="118" width="56" height="24" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="456" y="134" class="m" text-anchor="middle"><tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,2</tspan></text>
  <line x1="484" y1="130" x2="512" y2="130" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="148" y="186" width="72" height="32" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="184" y="202" class="m" text-anchor="middle"><tspan font-style="italic">&#x3C6;</tspan><tspan baseline-shift="sub" font-size="0.72em">n,K</tspan></text>
  <text x="184" y="214" class="s">hash head K</text>
  <line x1="220" y1="202" x2="236" y2="202" class="arr"/>
  <rect x="236" y="190" width="52" height="24" class="box" fill="#fff7ed" stroke="#fb923c"/>
  <text x="262" y="206" class="m" text-anchor="middle"><tspan font-style="italic">z</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,K</tspan></text>
  <line x1="288" y1="202" x2="304" y2="202" class="arr"/>
  <rect x="304" y="184" width="108" height="36" class="tbl"/>
  <rect x="310" y="190" width="14" height="10" class="cell"/>
  <rect x="310" y="200" width="14" height="10" class="cell"/>
  <rect x="324" y="190" width="14" height="10" class="cell"/>
  <rect x="324" y="200" width="14" height="10" class="cell"/>
  <rect x="338" y="190" width="14" height="10" class="cell"/>
  <rect x="338" y="200" width="14" height="10" class="cell"/>
  <rect x="352" y="190" width="14" height="10" class="cell"/>
  <rect x="352" y="200" width="14" height="10" class="cell"/>
  <rect x="366" y="190" width="14" height="10" class="cell"/>
  <rect x="366" y="200" width="14" height="10" class="cell"/>
  <rect x="380" y="190" width="14" height="10" class="cell"/>
  <rect x="380" y="200" width="14" height="10" class="cell"/>
  <rect x="318" y="200" width="14" height="10" class="hit"/>
  <text x="358" y="188" class="fm" text-anchor="middle"><tspan font-style="italic">E</tspan><tspan baseline-shift="sub" font-size="0.68em">n,K</tspan></text>
  <line x1="412" y1="202" x2="428" y2="202" class="arr"/>
  <rect x="428" y="190" width="56" height="24" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="456" y="206" class="m" text-anchor="middle"><tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t,n,K</tspan></text>
  <line x1="484" y1="202" x2="512" y2="202" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="512" y1="58" x2="512" y2="202" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="512" y1="130" x2="528" y2="130" class="arr"/>
  <rect x="528" y="108" width="72" height="44" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="564" y="126" class="b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">concat</text>
  <text x="564" y="142" class="s" text-anchor="middle">Step 4: <tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t</tspan></text>

  <!-- CPU: pre-calculable (right) -->
  <rect x="468" y="168" width="108" height="52" class="note"/>
  <text x="522" y="188" class="b" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Pre-calculable</text>
  <text x="522" y="202" class="s" font-size="8" fill="#15803d" text-anchor="middle">index = f(input ids)</text>
  <text x="522" y="214" class="s" font-size="8" fill="#15803d" text-anchor="middle">lookup on CPU / CXL</text>

  <!-- prefetch across CPU|GPU boundary -->
  <path d="M 564 152 L 564 226 L 564 256" class="pref"/>
  <text x="576" y="246" class="s" font-size="7" fill="#c2410c" text-anchor="start">prefetch</text>

  <rect x="514" y="264" width="100" height="40" class="box" fill="#ffedd5" stroke="#ea580c" stroke-width="1.3"/>
  <text x="564" y="282" class="b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <tspan font-style="italic">e</tspan><tspan baseline-shift="sub" font-size="0.72em">t</tspan> staging
  </text>
  <text x="564" y="296" class="s" font-size="8" text-anchor="middle">VRAM buffer</text>

  <text x="200" y="282" class="s" font-size="8" fill="#c2410c" text-anchor="start">Step 5+ on GPU: W_K, W_V, gate alpha (needs h_t)</text>

  <rect x="16" y="168" width="96" height="52" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="64" y="186" class="s" font-size="8" text-anchor="middle">prime-sized</text>
  <text x="64" y="200" class="s" font-size="8" text-anchor="middle">tables per head</text>
  <text x="64" y="214" class="s" font-size="8" text-anchor="middle">Host DRAM / CXL</text>

  <text x="360" y="326" class="s" text-anchor="middle">each order <tspan font-style="italic">n</tspan> has <tspan font-style="italic">K</tspan> independent heads; full n-gram space too large for explicit tabulation</text>
</svg>
