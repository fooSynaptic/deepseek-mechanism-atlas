<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="topo_a" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:700;fill:#0f172a}
      .sub{font-size:11px;fill:#64748b}
      .h{font-size:11px;font-weight:600;fill:#334155}
      .l{font-size:10px;fill:#334155;text-anchor:middle}
      .l0{font-size:9px;fill:#64748b;text-anchor:middle}
      .l1{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5}
      .l2{fill:#ecfdf5;stroke:#16a34a;stroke-width:1.5}
      .l3{fill:#fef3c7;stroke:#d97706;stroke-width:1.5}
      .node{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5;rx:10}
      .arr{stroke:#475569;stroke-width:1.5;fill:none;marker-end:url(#topo_a)}
      .arrp{stroke:#d97706;stroke-width:1.5;fill:none;stroke-dasharray:5 3;marker-end:url(#topo_a)}
    </style>
  </defs>

  <text x="24" y="30" class="title">CXL Engram Hardware Topology (Paper Fig.4)</text>
  <text x="24" y="48" class="sub">L1 GPU HBM | L2 Host DRAM | L3 CXL Pool | XConn XC50256 | up to 8 nodes / 4 TB / 512 GB/s</text>

  <!-- Legend -->
  <rect x="24" y="62" width="72" height="22" class="l1" rx="4"/>
  <text x="60" y="77" class="l0">L1 HBM</text>
  <rect x="104" y="62" width="88" height="22" class="l2" rx="4"/>
  <text x="148" y="77" class="l0">L2 Local DRAM</text>
  <rect x="200" y="62" width="88" height="22" class="l3" rx="4"/>
  <text x="244" y="77" class="l0">L3 CXL Pool</text>

  <!-- Node 0 -->
  <rect x="40" y="100" width="380" height="200" class="node"/>
  <text x="230" y="120" class="h">Node 0</text>
  <rect x="60" y="132" width="100" height="52" class="l1" rx="6"/>
  <text x="110" y="154" class="l">GPU HBM (L1)</text>
  <text x="110" y="170" class="l0">weights / hidden</text>
  <text x="110" y="182" class="l0">staging buffer</text>
  <rect x="180" y="132" width="80" height="52" class="l2" rx="6"/>
  <text x="220" y="158" class="l">CPU</text>
  <text x="220" y="174" class="l0">hash / offsets</text>
  <rect x="280" y="132" width="120" height="52" class="l2" rx="6"/>
  <text x="340" y="154" class="l">Local DRAM (L2)</text>
  <text x="340" y="170" class="l0">hot cache / mmap win</text>
  <rect x="120" y="200" width="220" height="36" fill="#fff" stroke="#cbd5e1" rx="6"/>
  <text x="230" y="222" class="l">PCIe 5.0 x16 CXL Adapter</text>
  <line x1="110" y1="184" x2="110" y2="200" class="arrp"/>
  <line x1="220" y1="184" x2="220" y2="200" class="arrp"/>
  <line x1="340" y1="184" x2="340" y2="200" class="arrp"/>
  <line x1="230" y1="236" x2="230" y2="268" class="arr"/>

  <!-- Node 1 -->
  <rect x="500" y="100" width="380" height="200" class="node"/>
  <text x="690" y="120" class="h">Node 1 (same layout)</text>
  <rect x="520" y="132" width="100" height="52" class="l1" rx="6"/>
  <text x="570" y="154" class="l">GPU HBM (L1)</text>
  <text x="570" y="170" class="l0">shared Engram read</text>
  <rect x="640" y="132" width="80" height="52" class="l2" rx="6"/>
  <text x="680" y="158" class="l">CPU</text>
  <rect x="740" y="132" width="120" height="52" class="l2" rx="6"/>
  <text x="800" y="154" class="l">Local DRAM (L2)</text>
  <rect x="580" y="200" width="220" height="36" fill="#fff" stroke="#cbd5e1" rx="6"/>
  <text x="690" y="222" class="l">PCIe 5.0 x16 CXL Adapter</text>
  <line x1="690" y1="236" x2="690" y2="268" class="arr"/>

  <!-- CXL Switch -->
  <rect x="160" y="268" width="600" height="44" class="l3" rx="8"/>
  <text x="460" y="288" class="l" font-weight="600">CXL Switch (XConn XC50256) - 512 GB/s aggregate</text>
  <text x="460" y="302" class="l0">fine-grained load/store, multi-host address mapping</text>
  <line x1="230" y1="268" x2="280" y2="268" class="arr"/>
  <line x1="690" y1="268" x2="640" y2="268" class="arr"/>

  <!-- L3 Pool -->
  <rect x="200" y="330" width="520" height="90" class="l3" rx="10"/>
  <text x="460" y="358" class="l" font-weight="600">CXL Memory Pool (L3)</text>
  <text x="460" y="376" class="l0">Engram Embedding Tables - read-only, DAX mmap, no cross-node coherence</text>
  <text x="460" y="392" class="l0">prototype 256 GB/card | scale-out 4 TB shared by 8 servers</text>
  <text x="460" y="408" class="l0">one physical copy vs per-node DRAM replica</text>
  <line x1="460" y1="312" x2="460" y2="330" class="arr"/>

  <!-- Side note -->
  <rect x="40" y="440" width="840" height="44" rx="8" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="460" y="460" class="l">DAX: cxl_base + offset[i] in userspace | Paths: CXL-&gt;CPU (OpenMP memcpy) or CXL-&gt;GPU (cxl2vram_copy P2P)</text>
  <text x="460" y="476" class="l0">Engram params off HBM; GPU keeps compute + small gate/conv weights only</text>
</svg>
