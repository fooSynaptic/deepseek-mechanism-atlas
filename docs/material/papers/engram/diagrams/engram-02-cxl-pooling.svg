<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="a2o" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <style>
      .t{font-size:16px;font-weight:700;fill:#0f172a}
      .s{font-size:11px;fill:#64748b}
      .h{font-size:12px;font-weight:600;fill:#334155}
      .l{font-size:10px;fill:#334155;text-anchor:middle}
      .gpu{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5;rx:8}
      .cxl{fill:#fef3c7;stroke:#d97706;stroke-width:1.5;rx:8}
      .tbl{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.5;rx:6}
      .arr{stroke:#475569;stroke-width:1.4;fill:none;marker-end:url(#a2)}
      .pref{stroke:#d97706;stroke-width:1.6;fill:none;stroke-dasharray:5 4;marker-end:url(#a2o)}
    </style>
  </defs>

  <text x="24" y="32" class="t">(2) CXL Pooling - Multi-Node Engram Memory Pool</text>
  <text x="24" y="52" class="s">arXiv:2603.10087 | Place 100B+ tables in CXL pool; fine-grained access near DRAM speed</text>

  <text x="40" y="88" class="h">SGLang inference nodes (multi-GPU / multi-node)</text>
  <rect x="40" y="100" width="200" height="90" class="gpu"/>
  <text x="140" y="125" class="l">GPU Worker A</text>
  <text x="140" y="142" class="l" font-size="9">Transformer L0-L1 compute</text>
  <text x="140" y="158" class="l" font-size="9">Engram trigger @ L2, L15</text>
  <rect x="280" y="100" width="200" height="90" class="gpu"/>
  <text x="380" y="125" class="l">GPU Worker B</text>
  <text x="380" y="142" class="l" font-size="9">same stack, shared Engram table</text>

  <rect x="120" y="230" width="280" height="70" class="cxl"/>
  <text x="260" y="255" class="l" font-weight="600">CXL Switch + Memory Pool</text>
  <text x="260" y="272" class="l" font-size="9">multi-node shared load/store semantics</text>
  <rect x="140" y="285" width="240" height="44" class="tbl"/>
  <text x="260" y="304" class="l">Engram Embedding Tables (100B+ params)</text>
  <text x="260" y="318" class="l" font-size="9">sparse discrete access, deterministic prefetch</text>

  <line x1="140" y1="190" x2="200" y2="230" class="arr"/>
  <line x1="380" y1="190" x2="320" y2="230" class="arr"/>

  <text x="520" y="88" class="h">Timeline: compute / table fetch overlap</text>
  <rect x="520" y="100" width="380" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="540" y="125" class="l" text-anchor="start" font-size="10">t0: GPU Layer 0-1 forward</text>
  <line x1="540" y1="135" x2="880" y2="135" stroke="#2563eb" stroke-width="14" opacity="0.35"/>
  <text x="540" y="158" class="l" text-anchor="start" font-size="10">t1: CXL async prefetch Engram @ L2</text>
  <line x1="600" y1="168" x2="860" y2="168" class="pref"/>
  <line x1="600" y1="168" x2="860" y2="168" stroke="#d97706" stroke-width="10" opacity="0.35"/>
  <text x="540" y="195" class="l" text-anchor="start" font-size="10">t2: GPU Layer 2 (embeddings ready)</text>
  <text x="710" y="210" class="l" fill="#16a34a">minimal end-to-end throughput loss</text>

  <text x="520" y="250" class="h">Why not RDMA?</text>
  <rect x="520" y="262" width="180" height="100" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="610" y="285" class="l" fill="#b91c1c">RDMA</text>
  <text x="610" y="302" class="l" font-size="9">optimized for large transfers</text>
  <text x="610" y="316" class="l" font-size="9">poor for sparse small lookups</text>
  <text x="610" y="348" class="l" font-size="9">high random-access overhead</text>
  <rect x="720" y="262" width="180" height="100" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="810" y="285" class="l" fill="#16a34a">CXL Pool</text>
  <text x="810" y="302" class="l" font-size="9">hardware load/store</text>
  <text x="810" y="316" class="l" font-size="9">matches Engram access pattern</text>
  <text x="810" y="348" class="l" font-size="9">near local DRAM performance</text>

  <text x="40" y="400" class="h">Optimization goals</text>
  <rect x="40" y="412" width="860" height="88" rx="10" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="470" y="442" class="l">Lower cost: tables off expensive HBM, one shared pool across nodes</text>
  <text x="470" y="462" class="l">Keep speed: deterministic addressing enables prefetch pipeline overlap</text>
  <text x="470" y="482" class="l">Production: SGLang integration, Qwen3-4B/8B near-DRAM throughput</text>
</svg>
