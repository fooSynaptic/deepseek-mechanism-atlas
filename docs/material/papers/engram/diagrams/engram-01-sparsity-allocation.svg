<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .t{font-size:16px;font-weight:700;fill:#0f172a}
      .s{font-size:11px;fill:#64748b}
      .h{font-size:12px;font-weight:600;fill:#334155}
      .l{font-size:10px;fill:#334155;text-anchor:middle}
      .box{rx:8;stroke-width:1.5}
      .moe{fill:#dbeafe;stroke:#2563eb}
      .mem{fill:#ede9fe;stroke:#7c3aed}
      .good{fill:#dcfce7;stroke:#16a34a}
      .arr{stroke:#475569;stroke-width:1.4;fill:none;marker-end:url(#a1)}
    </style>
  </defs>

  <text x="24" y="32" class="t">(1) Engram - Dual Sparsity Axis and U-Shaped Allocation</text>
  <text x="24" y="52" class="s">arXiv:2601.07372 | Fig.3 left: iso-params, iso-FLOPs; optimum rho ~75-80% MoE (~20-25% Engram)</text>

  <text x="40" y="88" class="h">Before: Pure MoE (100% conditional compute)</text>
  <rect x="40" y="100" width="380" height="100" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="230" y="122" class="l" fill="#64748b">Input token sequence</text>
  <rect x="60" y="132" width="340" height="28" class="box moe"/>
  <text x="230" y="150" class="l">Transformer + MoE: FFN/Attn simulate static n-gram patterns</text>
  <text x="230" y="182" class="l" fill="#b91c1c">Early layers waste capacity on static reconstruction</text>

  <text x="40" y="228" class="h">After: MoE + Engram (optimal rho ~75-80% MoE + ~20-25% Engram)</text>
  <rect x="40" y="240" width="380" height="130" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="230" y="262" class="l" fill="#64748b">Input tokens (deterministic addressing)</text>
  <rect x="60" y="272" width="155" height="36" class="box mem"/>
  <text x="138" y="288" class="l">Engram O(1) lookup</text>
  <text x="138" y="300" class="l" font-size="9">n-gram - hash - embedding</text>
  <rect x="245" y="272" width="155" height="36" class="box moe"/>
  <text x="323" y="288" class="l">MoE dynamic routing</text>
  <text x="323" y="300" class="l" font-size="9">route by hidden state</text>
  <text x="230" y="318" class="l">gated fusion</text>
  <rect x="100" y="328" width="260" height="28" class="box good"/>
  <text x="230" y="346" class="l">Effective depth up; long-context retrieval up (NIAH 84 to 97)</text>

  <text x="500" y="88" class="h">Fig.3 left: Validation loss vs allocation ratio rho</text>
  <rect x="500" y="100" width="400" height="270" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <!-- plot area: x 560-848, y 145-315; loss increases upward (low loss at bottom) -->
  <line x1="560" y1="315" x2="848" y2="315" stroke="#94a3b8" stroke-width="1"/>
  <line x1="560" y1="145" x2="560" y2="315" stroke="#94a3b8" stroke-width="1"/>
  <text x="704" y="338" class="l">Allocation Ratio (rho)</text>
  <text x="518" y="235" class="l" transform="rotate(-90 518 235)">Validation Loss</text>
  <!-- y ticks: 6e20 regime (left axis) -->
  <text x="548" y="319" class="l" text-anchor="end" font-size="8" fill="#64748b">1.710</text>
  <text x="548" y="233" class="l" text-anchor="end" font-size="8" fill="#64748b">1.728</text>
  <text x="548" y="149" class="l" text-anchor="end" font-size="8" fill="#64748b">1.745</text>
  <!-- x ticks -->
  <text x="560" y="330" class="l" font-size="8">40%</text>
  <text x="675" y="330" class="l" font-size="8">70%</text>
  <text x="752" y="330" class="l" font-size="8">80%</text>
  <text x="848" y="330" class="l" font-size="8">100%</text>
  <!-- 6e20 FLOPs curve (dark, U-valley) -->
  <path d="M 560,195 C 620,260 680,310 752,312 C 800,313 830,270 848,248" fill="none" stroke="#1e3a5f" stroke-width="2.2" stroke-dasharray="6 4"/>
  <circle cx="752" cy="312" r="5" fill="#16a34a" stroke="#fff" stroke-width="1"/>
  <text x="752" y="298" class="l" fill="#16a34a" font-weight="600" font-size="9">min ~1.7109 @ rho~80%</text>
  <circle cx="848" cy="248" r="4" fill="#1e3a5f"/>
  <text x="848" y="236" class="l" font-size="8" fill="#1e3a5f">Pure MoE 1.7248</text>
  <!-- 2e20 FLOPs curve (teal, same U-shape, higher loss) -->
  <path d="M 560,165 C 630,230 690,278 752,280 C 798,281 828,240 848,218" fill="none" stroke="#0d9488" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="848" y="206" class="l" font-size="8" fill="#0d9488">2e20 regime</text>
  <!-- legend -->
  <line x1="570" y1="118" x2="590" y2="118" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="598" y="121" class="l" text-anchor="start" font-size="8">6e20 FLOPs</text>
  <line x1="660" y1="118" x2="680" y2="118" stroke="#0d9488" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="688" y="121" class="l" text-anchor="start" font-size="8">2e20 FLOPs (higher loss band)</text>
  <text x="704" y="136" class="l" font-size="8" fill="#64748b">iso-params | both curves: U-valley, not inverted</text>

  <text x="500" y="400" class="h">Mechanism: memory for static, compute for dynamic</text>
  <rect x="500" y="412" width="190" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="595" y="438" class="l">Engram handles</text>
  <text x="595" y="454" class="l">local n-gram / facts</text>
  <text x="595" y="470" class="l" font-size="9">prefetch / offload to DRAM</text>
  <rect x="710" y="412" width="190" height="70" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="805" y="438" class="l">MoE + Attn handles</text>
  <text x="805" y="454" class="l">global reasoning / logic</text>
  <text x="805" y="470" class="l" font-size="9">frees effective depth</text>
</svg>
