<text x="460" y="22" class="t">DeepSeek-V3 FP8 dynamic quantization (Figure 7)</text><text x="460" y="40" class="st">fine-grained block scales  +  periodic FP32 accumulation promotion</text><rect x="24" y="56" width="872" height="252" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">(a) Fine-grained quantization  (per-block dynamic scale)</text><rect x="72" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="104" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="136" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="168" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="200" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="150" y="120" class="an">activation blocks (Nc)</text><rect x="80" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="112" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="144" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="176" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="208" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="142" y="186" class="dt">dynamic scale sx</text><rect x="300" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="332" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="364" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="396" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><rect x="428" y="128" width="28" height="22" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="378" y="120" class="an">weight blocks (Nc)</text><rect x="308" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="340" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="372" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="404" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><rect x="436" y="164" width="12" height="12" rx="2" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="370" y="186" class="dt">dynamic scale sw</text><rect x="542" y="142" width="136" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="610" y="160" class="lb">Tensor Core</text><text x="610" y="176" class="dt">FP8 GEMM</text><text x="610" y="190" class="dt">low prec product</text><line x1="142" y1="150" x2="542" y2="174" class="arr-b"/><line x1="370" y1="150" x2="542" y2="174" class="arr-b"/><rect x="718" y="142" width="124" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="780" y="160" class="lb">CUDA Core</text><text x="780" y="176" class="dt">output</text><text x="780" y="190" class="dt">times sx times sw</text><line x1="678" y1="174" x2="718" y2="174" class="arr-g"/><text x="460" y="296" class="an">block-wise scales absorb activation outliers before dequant</text><rect x="24" y="326" width="872" height="240" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="344" class="ph">(b) Increasing accumulation precision  (promote every Nc = 128 MMA)</text><rect x="86" y="394" width="88" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="130" y="412" class="lb">WGMMA 1</text><text x="130" y="428" class="dt">FP8 MMA</text><line x1="174" y1="422" x2="246" y2="422" class="arr"/><rect 