<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 638" width="920" height="638">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#gpoa); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#gpoad); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#gpoab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#gpoag); }
]]></style>
<defs>
  <marker id="gpoa" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="gpoad" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="gpoab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="gpoag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="22" class="t">PPO vs GRPO: RL optimization comparison</text><text x="460" y="40" class="st">RLHF (neural RM + critic)  vs  RLVR (verifier + group baseline, no critic)</text><rect x="24" y="56" width="420" height="448" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">RLHF + PPO (typical open alignment)</text><rect x="476" y="56" width="420" height="448" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="488" y="74" class="ph">RLVR + GRPO (DeepSeek-R1 path)</text><text x="234" y="108" class="an">neural RM reward</text><text x="686" y="108" class="an">verifier reward</text><text x="234" y="122" class="an">needs critic V</text><text x="686" y="122" class="an">no critic</text><rect x="136" y="90" width="196" height="56" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="234" y="108" class="lb">Prompt</text><text x="234" y="124" class="dt">x</text><rect x="136" y="158" width="196" height="56" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="234" y="176" class="lb">Policy pi</text><text x="234" y="192" class="dt">LLM weights</text><line x1="234" y1="146" x2="234" y2="158" class="arr"/><rect x="136" y="222" width="196" height="64" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="234" y="240" class="lb">Rollout</text><text x="234" y="256" class="dt">1 response typical</text><text x="234" y="270" class="dt">per update step</text><line x1="234" y1="214" x2="234" y2="222" class="arr"/><rect x="136" y="290" width="196" height="64" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/><text x="234" y="308" class="lb">Neural RM</text><text x="234" y="324" class="dt">human-preference model</text><text x="234" y="338" class="dt">scalar reward R</text><line x1="234" y1="286" x2="234" y2="290" class="arr"/><rect x="136" y="358" width="196" height="64" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/><text x="234" y="376" class="lb">Critic V</text><text x="234" y="392" class="dt">value network</text><text x="234" y="406" class="dt">extra GPU memory</text><line x1="234" y1="354" x2="234" y2="358" class="arr"/><rect x="136" y="426" width="196" height="64" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/><text x="234" y="444" class="lb">PPO update</text><text x="234" y="460" class="dt">Adv = R - V(s) or GAE</text><text x="234" y="474" class="dt">clip + critic loss</text><line x1="234" y1="422" x2="234" y2="426" class="arr"/><rect x="588" y="90" width="196" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="686" y="108" class="lb">Prompt</text><text x="686" y="124" class="dt">x</text><rect x="588" y="158" width="196" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="686" y="176" class="lb">Policy pi</text><text x="686" y="192" class="dt">V3-Base weights</text><line x1="686" y1="146" x2="686" y2="158" class="arr"/><line x1="686" y1="214" x2="686" y2="218" class="arr"/><rect x="588" y="218" width="196" height="72" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="686" y="234" class="lb">G rollouts / prompt</text><text x="686" y="248" class="dt">R1 stage-1: G about 16</text><rect x="609" y="262" width="34" height="22" rx="4" fill="#ffffff" stroke="#4A90D9" stroke-width="1.5"/><text x="626" y="277" class="dt">y1</text><rect x="649" y="262" width="34" height="22" rx="4" fill="#ffffff" stroke="#4A90D9" stroke-width="1.5"/><text x="666" y="277" class="dt">y2</text><rect x="689" y="262" width="34" height="22" rx="4" fill="#ffffff" stroke="#4A90D9" stroke-width="1.5"/><text x="706" y="277" class="dt">y3</text><rect x="729" y="262" width="34" height="22" rx="4" fill="#ffffff" stroke="#4A90D9" stroke-width="1.5"/><text x="746" y="277" class="dt">yG</text><line x1="686" y1="290" x2="686" y2="290" class="arr"/><rect x="588" y="290" width="196" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="686" y="308" class="lb">Verifier reward</text><text x="686" y="324" class="dt">sympy / unit test / format</text><text x="686" y="338" class="dt">scores r1..rG</text><line x1="686" y1="354" x2="686" y2="358" class="arr"/><rect x="588" y="358" width="196" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="686" y="376" class="lb">Group baseline</text><text x="686" y="392" class="dt">mean r over G samples</text><text x="686" y="406" class="dt">Adv_i = r_i - mean(r)</text><line x1="686" y1="422" x2="686" y2="426" class="arr"/><rect x="588" y="426" width="196" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="686" y="444" class="lb">GRPO update</text><text x="686" y="460" class="dt">policy grad only</text><text x="686" y="474" class="dt">KL to reference + clip</text><text x="460" y="312" class="st">vs</text><text x="460" y="380" class="an">V(s) baseline</text><text x="460" y="396" class="an">group mean baseline</text><rect x="24" y="522" width="872" height="96" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="540" class="ph">Key contrast</text><rect x="56" y="548" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="180" y="566" class="lb">Critic</text><text x="180" y="582" class="dt">PPO: value net V</text><text x="180" y="596" class="dt">GRPO: none</text><rect x="336" y="548" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="460" y="566" class="lb">Advantage</text><text x="460" y="582" class="dt">PPO: R - V or GAE</text><text x="460" y="596" class="dt">GRPO: r_i - mean(r)</text><rect x="616" y="548" width="248" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="740" y="566" class="lb">Typical use</text><text x="740" y="582" class="dt">PPO: open alignment</text><text x="740" y="596" class="dt">GRPO: math / code RLVR</text></svg>