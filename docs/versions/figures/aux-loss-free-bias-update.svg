<text x="260" y="22" class="t" text-anchor="middle">aux-loss-free：batch-wise bias 更新</text><rect x="80" y="42" width="360" height="40" rx="6" fill="#fff0f0" stroke="#e8a0a0" stroke-width="1.5"/><text x="260" y="62" class="lb" text-anchor="middle">若 expert i 过载（overload）</text><text x="260" y="88" class="an" text-anchor="middle">b_i -= γ</text><rect x="80" y="92" width="360" height="40" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="260" y="112" class="lb" text-anchor="middle">若 expert i 欠载（underload）</text><text x="260" y="138" class="an" text-anchor="middle">b_i += γ</text></svg>