<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 508" width="920" height="508">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#dara); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#darad); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#darab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#darag); }
]]></style>
<defs>
  <marker id="dara" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="darad" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="darab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="darag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="22" class="t">DSpark 半自回归候选生成（并行主干 + 顺序模块）</text><text x="460" y="40" class="st">单轮 draft：一次并行猜 K 位  |  顺序头逐位补块内因果  |  提议 q 对齐 target 校验 p</text><rect x="24" y="56" width="872" height="172" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">阶段 1：并行主干（单轮 draft 一次前向猜 K 位）</text><rect x="54" y="116" width="128" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="118" y="134" class="lb">Target hidden</text><text x="118" y="150" class="dt">h from target</text><text x="118" y="164" class="dt">fixed prefix</text><line x1="182" y1="148" x2="248" y2="148" class="arr-b"/><rect x="264" y="116" width="168" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="348" y="134" class="lb">并行 Transformer</text><text x="348" y="150" class="dt">1 forward</text><text x="348" y="164" class="dt">K slots parallel</text><line x1="432" y1="148" x2="478" y2="148" class="arr-g"/><rect x="524" y="126" width="48" height="44" rx="6" fill="#fafafa" stroke="#9aa8bc" stroke-width="1.5"/><text x="548" y="142" class="lb">pos 1</text><text x="548" y="158" class="dt">logit</text><rect x="582" y="126" width="48" height="44" rx="6" fill="#fafafa" stroke="#9aa8bc" stroke-width="1.5"/><text x="606" y="142" class="lb">pos 2</text><text x="606" y="158" class="dt">logit</text><rect x="640" y="126" width="48" height="44" rx="6" fill="#fafafa" stroke="#9aa8bc" stroke-width="1.5"/><text x="664" y="142" class="lb">pos 3</text><text x="664" y="158" class="dt">logit</text><rect x="698" y="126" width="48" height="44" rx="6" fill="#fafafa" stroke="#9aa8bc" stroke-width="1.5"/><text x="722" y="142" class="lb">...</text><text x="722" y="158" class="dt">logit</text><rect x="756" y="126" width="48" height="44" rx="6" fill="#fafafa" stroke="#9aa8bc" stroke-width="1.5"/><text x="780" y="142" class="lb">pos K</text><text x="780" y="158" class="dt">logit</text><text x="460" y="214" class="an">各位共享 h，块内互不见已猜 draft（第 1 位接近 DFlash，后缀 logits 待修）</text><rect x="24" y="244" width="872" height="148" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="262" class="ph">阶段 2：轻量顺序模块（马尔可夫 / RNN 头，逐位注入前序 draft）</text><rect x="76" y="290" width="108" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="130" y="308" class="lb">draft x1</text><text x="130" y="324" class="dt">from pos 1</text><line x1="184" y1="318" x2="228" y2="318" class="arr-g"/><rect x="236" y="290" width="112" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="292" y="308" class="lb">顺序头</text><text x="292" y="324" class="dt">inject x1</text><line x1="348" y1="318" x2="392" y2="318" class="arr-g"/><rect x="402" y="290" width="108" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="456" y="308" class="lb">refine pos 2</text><text x="456" y="324" class="dt">q2</text><line x1="510" y1="318" x2="554" y2="318" class="arr-g"/><rect x="562" y="290" width="112" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="618" y="308" class="lb">顺序头</text><text x="618" y="324" class="dt">inject x2</text><line x1="674" y1="318" x2="718" y2="318" class="arr-g"/><rect x="728" y="290" width="108" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="782" y="308" class="lb">refine pos 3</text><text x="782" y="324" class="dt">q3 ... qK</text><text x="460" y="378" class="an">x1 注入 pos2，x2 注入 pos3 ... 后缀补块内因果</text><line x1="460" y1="392" x2="460" y2="432" class="arr-b"/><rect x="210" y="431" width="500" height="78" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="460" y="449" class="lb">Target 校验（ground truth p）</text><text x="460" y="465" class="dt">逐位比较 draft q_i 与 target p_i</text><text x="460" y="479" class="dt">接受最长前缀（lossless rejection sampling）</text><text x="460" y="493" class="dt">对齐：h 经 f_spec 得 q，校验整段前向得 p</text></svg>