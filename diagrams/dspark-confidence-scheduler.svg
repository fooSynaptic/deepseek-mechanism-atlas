<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 588" width="920" height="588">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#dcsa); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#dcsad); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#dcsab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#dcsag); }
]]></style>
<defs>
  <marker id="dcsa" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="dcsad" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="dcsab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="dcsag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="22" class="t">DSpark 置信度调度验证</text><text x="460" y="40" class="st">每位置信度 + 硬件吞吐曲线  |  动态选验证长度  |  最大化全局吞吐</text><rect x="24" y="56" width="872" height="124" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">步骤 1-2：置信度输出与温度缩放校准</text><rect x="76" y="98" width="148" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="150" y="116" class="lb">Draft K 位候选</text><text x="150" y="132" class="dt">semi-AR draft block</text><line x1="224" y1="126" x2="278" y2="126" class="arr-g"/><rect x="276" y="94" width="168" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="360" y="112" class="lb">逐位置信度</text><text x="360" y="128" class="dt">前缀全接受下</text><text x="360" y="142" class="dt">该 token 存活概率</text><line x1="444" y1="126" x2="490" y2="126" class="arr-g"/><rect x="490" y="94" width="180" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="580" y="112" class="lb">温度缩放校准</text><text x="580" y="128" class="dt">验证集拟合</text><text x="580" y="142" class="dt">置信度 约等于 经验接受率</text><text x="460" y="166" class="an">校准后置信度可预测各前缀位被 target 接受的概率</text><rect x="24" y="194" width="872" height="158" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="212" class="ph">步骤 3：硬件感知前缀调度器</text><rect x="126" y="220" width="168" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="210" y="238" class="lb">并发请求置信度</text><text x="210" y="254" class="dt">batch 内各请求</text><text x="210" y="268" class="dt">前缀置信曲线</text><rect x="626" y="220" width="168" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="710" y="238" class="lb">实测吞吐曲线</text><text x="710" y="254" class="dt">GPU batch vs</text><text x="710" y="268" class="dt">verify 长度曲线</text><line x1="210" y1="280" x2="210" y2="280" class="arr-g"/><line x1="210" y1="280" x2="336" y2="280" class="arr-g"/><line x1="710" y1="280" x2="710" y2="280" class="arr-b"/><line x1="710" y1="280" x2="584" y2="280" class="arr-b"/><rect x="336" y="280" width="248" height="64" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="460" y="298" class="lb">硬件感知前缀调度器</text><text x="460" y="314" class="dt">按置信 + 吞吐选验证长度</text><text x="460" y="328" class="dt">目标：最大化全局吞吐</text><text x="460" y="338" class="an">负载自适应：低并发验 4-6 token；高并发平滑缩短，避免 target 争用</text><rect x="24" y="366" width="872" height="108" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="384" class="ph">输出：每请求动态验证长度</text><line x1="460" y1="352" x2="460" y2="394" class="arr"/><rect x="212" y="400" width="156" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="290" y="418" class="lb">低并发</text><text x="290" y="434" class="dt">verify 4-6 token</text><rect x="552" y="400" width="156" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="630" y="418" class="lb">高并发</text><text x="630" y="434" class="dt">平滑缩短 verify</text><line x1="460" y1="474" x2="460" y2="494" class="arr-b"/><rect x="220" y="498" width="480" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="460" y="516" class="lb">Target verify（选定长度）</text><text x="460" y="532" class="dt">跳过低置信尾巴，少浪费 target 算力</text><text x="460" y="546" class="dt">同等吞吐下提升单用户 decode 速度</text></svg>