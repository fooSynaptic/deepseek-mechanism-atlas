<text x="460" y="22" class="t">DeepSeek-V3 MTP and speculative decoding</text><text x="460" y="40" class="st">training: shared emb/head + causal MTP chain  |  inference: native MTP vs external draft</text><rect x="24" y="56" width="872" height="400" rx="8" fill="#eef1f8" stroke="#b0bdd4" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">1  MTP training (V3 paper Figure 3 style)</text><text x="460" y="108" class="an">hidden chain: Main Block L  then  MTP-1 Block  then  MTP-2 Block</text><text x="160" y="88" class="lb">Main Model (next token)</text><rect x="76" y="104" width="168" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="160" y="122" class="lb">Input</text><text x="160" y="138" class="dt">t1 t2 t3 t4</text><rect x="76" y="172" width="168" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="160" y="190" class="lb">Emb Layer</text><text x="160" y="206" class="dt">shared</text><line x1="160" y1="160" x2="160" y2="172" class="arr"/><rect x="76" y="240" width="168" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="160" y="258" class="lb">Transformer</text><text x="160" y="274" class="dt">Block x L</text><line x1="160" y1="228" x2="160" y2="240" class="arr"/><rect x="76" y="308" width="168" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="160" y="326" class="lb">Out Head</text><text x="160" y="342" class="dt">shared</text><line x1="160" y1="296" x2="160" y2="308" class="arr"/><rect x="76" y="376" width="168" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="160" y="394" class="lb">Target / Loss</text><text x="160" y="410" class="dt">t2..t5  L_Main</text><line x1="160" y1="364" x2="160" y2="376" class="arr"/><text x="460" y="88" class="lb">MTP Module 1 (next2)</text><rect x="376" y="94" width="168" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="460" y="112" class=