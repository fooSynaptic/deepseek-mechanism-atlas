<text x="460" y="22" class="t">DeepSeek-V4: heterogeneous KV cache (CSA / HCA / SWA)</text><text x="460" y="40" class="st">1M context: multi-type entries replace single MLA latent stream</text><rect x="24" y="56" width="872" height="108" rx="8" fill="#eef1f8" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="74" class="ph">Token stream compression (algorithm)</text><rect x="70" y="86" width="220" height="56" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="180" y="104" class="lb">Raw tokens L</text><text x="180" y="120" class="dt">full sequence</text><rect x="340" y="82" width="240" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="460" y="100" class="lb">CSA 4:1 compress</text><text x="460" y="116" class="dt">1 entry / 4 tokens</text><text x="460" y="130" class="dt">then DSA top-k</text><rect x="630" y="82" width="220" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="740" y="100" class="lb">HCA 128:1 compress</text><text x="740" y="116" class="dt">1 entry / 128 tokens</text><text x="740" y="130" class="dt">short dense attend</text><line x1="290" y1="114" x2="340" y2="114" class="arr"/><line x1="580" y1="114" x2="630" y2="114" class="arr"/><rect x="24" y="178" width="872" height="148" rx="8" fill="#eef1f8" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="196" class="ph">Coexisting KV types at inference</text><rect x="55" y="198" width="130" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="120" y="216" class="lb">CSA entry</text><text x="120" y="232" class="dt">4:1 compressed</text><text x="120" y="246" class="dt">sparse top-k</text><rect x="215" y="198" width="130" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="280" y="216" class="lb">HCA entry</text><text x="280" y="232" class="dt">128:1 compressed</text><text x="280" y="246" class="dt">dense short seq</text><rect x="375" y="198" width="130" height="64" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="440" y="216" class="lb">SWA window</text><text x="440" y="232" class="dt">recent n_win</text><text x="440" y="246" class="dt">own eviction</text><rect x="535" y="198" width="130" height="64" rx="6" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1.5"/><text x="600" y="216" class="lb">Indexer KV</text><text x="600" y="232" class="dt">CSA lightning</text><text x="600" y="246" class="dt">importance scores</text><rect x="695" y="198" width="130" height="64" rx="6" fill="#f8f9fc" stroke="#c5cee0" stroke-width="1.5"/><text x="760" y="216" class="lb">Tail buffer</text><text x="760" y="232" class="dt">incomplete block</text><text x="760" y="246" class="dt">wait for m</text><text x="460" y="312" class="an">Classical KV cache + per-request state blocks (paper sec 3.5.1)</text><rect x="24" y="340" width="872" height="96" rx="8" fill="#eef1f8" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="358" class="ph">HiSparse offload (infra): inactive C4 entries to CPU pinned memory</text><rect x="160" y="358" width="200" height="64" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="260" y="376" class="lb">GPU hot set</text><text x="260" y="392" class="dt">active CSA entries</text><text x="260" y="406" class="dt">decode working set</text><text x="460" y="394" class="lb">prefetch</text><rect x="550" y="358" width="220" height="64" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="660" y="376" class="lb">CPU pinned pool</text><text x="660" y="392" class="dt">inactive C4 offloaded</text><text x="660" y="406" class="dt">~3x token capacity</text><line x1="360" y1="390" x2="550" y2="390" class="arr-g"/></svg>