<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 570" width="920" height="570">
<style><![CDATA[
  .t { font: 700 15px sans-serif; fill: #1a1a2e; text-anchor: middle; }
  .st { font: 11px sans-serif; fill: #666; text-anchor: middle; }
  .ph { font: 600 12px sans-serif; fill: #4a5a7a; }
  .lb { font: 600 11px sans-serif; fill: #222; text-anchor: middle; }
  .dt { font: 10px sans-serif; fill: #555; text-anchor: middle; }
  .an { font: 9px sans-serif; fill: #2563eb; text-anchor: middle; }
  .arr { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#mlaa); }
  .arr-d { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#mlaad); }
  .arr-b { stroke: #4A90D9; stroke-width: 1.5; fill: none; marker-end: url(#mlaab); }
  .arr-g { stroke: #27AE60; stroke-width: 1.5; fill: none; marker-end: url(#mlaag); }
]]></style>
<defs>
  <marker id="mlaa" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#666"/></marker>
  <marker id="mlaad" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker>
  <marker id="mlaab" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4A90D9"/></marker>
  <marker id="mlaag" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#27AE60"/></marker>
</defs>
<text x="460" y="22" class="t">MLA forward flow (Multi-Head Latent Attention, Eq. 37-47)</text><text x="460" y="40" class="st">DeepSeek-V2/V3 typical dims: d=5120, n_h=128, d_c^KV=512, d_h^R=64</text><rect x="376" y="40" width="168" height="56" rx="6" fill="#f8f9fc" stroke="#334155" stroke-width="1.5"/><text x="460" y="58" class="lb">Input h_t</text><text x="460" y="74" class="dt">[B, d_model]</text><rect x="24" y="96" width="276" height="103" rx="8" fill="#eef1f8" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="114" class="ph">Query branch (37-40)</text><text x="162" y="134" class="dt">W^DQ h_t -&gt; c_t^Q [1536]</text><text x="162" y="149" class="dt">W^UQ c_t^Q -&gt; q_t^C [128,128]</text><text x="162" y="164" class="dt">RoPE(W^QR c_t^Q) -&gt; q_t^R</text><text x="162" y="179" class="dt">all heads share q_t^R [128,64]</text><text x="162" y="194" class="dt">q_{t,i} = [q_{t,i}^C ; q_t^R]</text><rect x="334" y="96" width="276" height="103" rx="8" fill="#eef1f8" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6 3"/><text x="346" y="114" class="ph">Key branch (41-44)</text><text x="472" y="134" class="dt">W^DKV h_t -&gt; c_t^KV [512]</text><text x="472" y="149" class="dt">K and V share c_t^KV</text><text x="472" y="164" class="dt">W^UK c_t^KV -&gt; k_t^C per head</text><text x="472" y="179" class="dt">RoPE(W^KR h_t) -&gt; k_t^R [64]</text><text x="472" y="194" class="dt">k_{t,i} = [k_{t,i}^C ; k_t^R]</text><rect x="644" y="96" width="276" height="103" rx="8" fill="#eef1f8" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6 3"/><text x="656" y="114" class="ph">Value branch (45)</text><text x="782" y="134" class="dt">reuse c_t^KV from Key</text><text x="782" y="149" class="dt">W^UV c_t^KV -&gt; v_t^C</text><text x="782" y="164" class="dt">no RoPE / no R branch</text><text x="782" y="179" class="dt">v_{t,i}^C per head [128]</text><text x="782" y="194" class="dt">simplest path saves cache</text><line x1="460" y1="96" x2="162" y2="96" class="arr-b"/><line x1="460" y1="96" x2="472" y2="96" class="arr-g"/><line x1="460" y1="96" x2="782" y2="96" class="arr"/><rect x="24" y="270" width="872" height="68" rx="8" fill="#eef1f8" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="288" class="ph">Attention per head i (46)</text><rect x="76" y="286" width="108" height="56" rx="6" fill="#eef4fc" stroke="#4A90D9" stroke-width="1.5"/><text x="130" y="304" class="lb">q_{t,i}</text><text x="130" y="320" class="dt">[d_h]</text><text x="250" y="318" class="lb">dot k_{j,i}</text><rect x="306" y="286" width="108" height="56" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="360" y="304" class="lb">k_{j,i}</text><text x="360" y="320" class="dt">j=1..t</text><text x="490" y="318" class="lb">Softmax</text><rect x="536" y="286" width="108" height="56" rx="6" fill="#fff8ee" stroke="#E67E22" stroke-width="1.5"/><text x="590" y="304" class="lb">v_{j,i}^C</text><text x="590" y="320" class="dt">[d_h^C]</text><line x1="680" y1="314" x2="730" y2="314" class="arr"/><rect x="736" y="286" width="108" height="56" rx="6" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1.5"/><text x="790" y="304" class="lb">o_{t,i}</text><text x="790" y="320" class="dt">[d_h^C]</text><text x="460" y="354" class="an">weighted sum uses v^C only (no R in value)</text><rect x="24" y="366" width="872" height="52" rx="8" fill="#eef1f8" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="384" class="ph">Multi-head output (47)</text><text x="460" y="400" class="lb">concat(o_{t,1},...,o_{t,n_h}) then W^O -&gt; u_t [B, d_model]</text><rect x="24" y="434" width="872" height="118" rx="8" fill="#eef1f8" stroke="#c5cee0" stroke-width="1.5" stroke-dasharray="6 3"/><text x="36" y="452" class="ph">KV cache at inference (typical dims)</text><rect x="48" y="460" width="380" height="72" rx="6" fill="#fff5f5" stroke="#fca5a5" stroke-width="1.5"/><text x="238" y="478" class="lb">Standard MHA cache</text><text x="238" y="494" class="dt">2 x n_h x d_h^C ~ 32768 dims / token</text><text x="238" y="510" class="dt">grows linearly with context T</text><text x="460" y="500" class="t">vs</text><rect x="492" y="460" width="380" height="72" rx="6" fill="#f0faf0" stroke="#27AE60" stroke-width="1.5"/><text x="682" y="478" class="lb">MLA cache</text><text x="682" y="494" class="dt">c^KV [512] + shared k^R [64] = 576 / token</text><text x="682" y="510" class="dt">on read: W^UK / W^UV upsample to heads</text></svg>