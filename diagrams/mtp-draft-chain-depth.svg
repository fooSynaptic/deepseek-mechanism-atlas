<text x="460" y="506" class="m" text-anchor="middle" font-size="10px"><tspan>第 </tspan><tspan font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">k</tspan><tspan> 个 MTP 步预测 </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">x</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">t+k+1</tspan><tspan dy="-0.35em" font-size="1em"></tspan><tspan>；TRM</tspan><tspan baseline-shift="sub" font-size="0.72em">k</tspan><tspan> 仍只有 </tspan><tspan class="em">1</tspan><tspan> Block，变长的是 </tspan><tspan class="em">链</tspan><tspan> 而非单层堆深</tspan></text>

