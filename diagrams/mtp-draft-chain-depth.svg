  <text x="460" y="22" class="t" text-anchor="middle">MTP draft 计算链：串行、非一次性；链深度递增</text>
  <text x="460" y="40" class="s" text-anchor="middle"><tspan class="sn">K 次预测共用 1 个 OutHead；第 </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">k</tspan><tspan class="sn"> 步多融 1 个 </tspan><tspan>Emb(</tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">x</tspan><tspan dy="0.35em" font-size="0.72em" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">t+k</tspan><tspan dy="-0.35em" font-size="1em"></tspan><tspan>)</tspan><tspan class="sn">，路径经过 </tspan><tspan font-style="italic" font-family="Cambria Math, STIX Two Math, Latin Modern Math, serif">k</tspan><tspan class="sn"> 个 Fusion+TRM</tspan></text>
